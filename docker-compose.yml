name: "docker-tools"

services:
  mysql:
    image: mysql:8.0.26
    container_name: mysql
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_USER_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DEFAULT_DB_NAME}
    volumes:
      - ./mysql/dbdata:/var/lib/mysql
    networks:
      - docker-tools-network

  postgres:
    image: postgres:16-alpine3.20
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - ./postgres/dbdata:/var/lib/postgresql/data
    networks:
      - docker-tools-network

  libsql:
    image: ghcr.io/tursodatabase/libsql-server:latest
    ports:
      - "8085:8080"
      - "5001:5001"
    environment:
      - SQLD_NODE=primary
    volumes:
      - ./libsql/dbdata:/var/lib/sqld

  redis:
    image: redis:7.2.4-alpine
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - docker-tools-network

  rmq:
    image: rabbitmq:4-management-alpine
    container_name: rabbitmq
    ports:
      - "15672:15672"
      - "5672:5672"
    environment:
      - RABBITMQ_DEFAULT_USER=admin
      - RABBITMQ_DEFAULT_PASS=password
    volumes:
      - ./rabbitmq/data:/var/lib/rabbitmq
    hostname: rmq
    networks:
      - docker-tools-network

  jaeger-prepare-dir:
    # Run this step as root so that we can change the directory owner.
    user: root
    image: jaegertracing/jaeger:2.3.0
    entrypoint: []
    command:
      [
        "/bin/sh",
        -c,
        "mkdir -p /tmp/jaeger && touch /tmp/jaeger/.initialized && chown -R 10001:10001 /tmp/jaeger",
      ]
    volumes:
      - "./jaeger/data/:/tmp/jaeger/"

  jaeger:
    container_name: jaeger
    image: jaegertracing/jaeger:2.3.0
    environment:
      JAEGER_PROPAGATION: w3c
    command: ["--config", "/etc/jaeger/config.yml"]
    healthcheck:
      test: [CMD, wget, -qS, -O, "-", "0.0.0.0:13133/status"]
      start_period: 1s
    volumes:
      - "./jaeger/data/:/tmp/jaeger/"
      - "./jaeger/jaeger-ui.json:/etc/jaeger/jaeger-ui.json"
      - "./jaeger/config-spm.yml:/etc/jaeger/config.yml"
    ports:
      - 16686:16686
      - 4318:4318
    depends_on:
      jaeger-prepare-dir:
        condition: service_completed_successfully
    networks:
      - docker-tools-network

networks:
  docker-tools-network:
    name: docker-tools-network
    driver: bridge
